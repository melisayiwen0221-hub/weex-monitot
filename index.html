<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEEX 莊家監控 Pro - 即時價格與入場判斷</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: #0a0e1a;
            color: #e0e6ed;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #1a2332;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 2.2em;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        header p { color: #8892a0; font-size: 0.95em; }
        
        .controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            padding: 20px;
            background: #111827;
            border-radius: 12px;
            border: 1px solid #1f2937;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .control-group label {
            font-size: 0.8em;
            color: #8892a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .control-group input, .control-group select {
            background: #1f2937;
            border: 1px solid #374151;
            color: #e0e6ed;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9em;
            min-width: 140px;
        }
        .control-group input:focus, .control-group select:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .btn {
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s;
            align-self: flex-end;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,212,255,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
        
        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .status-pill {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-pill .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .status-connecting { background: #1e3a5f; color: #60a5fa; }
        .status-connected { background: #064e3b; color: #34d399; }
        .status-error { background: #450a0a; color: #f87171; }
        .status-pill.status-connecting .dot { background: #60a5fa; }
        .status-pill.status-connected .dot { background: #34d399; }
        .status-pill.status-error .dot { background: #f87171; animation: none; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .card {
            background: #111827;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1f2937;
            transition: border-color 0.3s;
        }
        .card:hover { border-color: #374151; }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .card-title {
            font-size: 1em;
            color: #8892a0;
            font-weight: 500;
        }
        .card-value {
            font-size: 1.8em;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }
        .card-sub {
            font-size: 0.8em;
            color: #6b7280;
            margin-top: 5px;
        }
        .positive { color: #34d399; }
        .negative { color: #f87171; }
        .neutral { color: #fbbf24; }
        
        .coin-input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .coin-input-area input {
            flex: 1;
            background: #1f2937;
            border: 1px solid #374151;
            color: #e0e6ed;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1em;
        }
        .coin-input-area input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #111827;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1f2937;
        }
        th {
            background: #1f2937;
            padding: 14px 16px;
            text-align: left;
            font-size: 0.8em;
            color: #8892a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        td {
            padding: 14px 16px;
            border-bottom: 1px solid #1f2937;
            font-size: 0.9em;
        }
        tr:hover td { background: #1a2332; }
        tr:last-child td { border-bottom: none; }
        
        .signal {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
        }
        .signal-buy { background: rgba(52,211,153,0.15); color: #34d399; }
        .signal-sell { background: rgba(248,113,113,0.15); color: #f87171; }
        .signal-hold { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .signal-strong-buy { background: rgba(52,211,153,0.3); color: #34d399; border: 1px solid #34d399; }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1f2937;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 6px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .log-area {
            background: #0d1117;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 15px;
            margin-top: 25px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            color: #6b7280;
        }
        .log-entry { margin-bottom: 4px; }
        .log-time { color: #4b5563; }
        .log-info { color: #60a5fa; }
        .log-success { color: #34d399; }
        .log-error { color: #f87171; }
        .log-warn { color: #fbbf24; }
        
        .whale-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .whale-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #6b7280;
        }
        .whale-dot.active {
            background: #fbbf24;
            box-shadow: 0 0 8px #fbbf24;
        }
        
        .api-test-result {
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.85em;
        }
        .api-test-success { background: rgba(52,211,153,0.1); border: 1px solid #34d399; color: #34d399; }
        .api-test-fail { background: rgba(248,113,113,0.1); border: 1px solid #f87171; color: #f87171; }
        
        @media (max-width: 768px) {
            .controls { flex-direction: column; }
            .grid { grid-template-columns: 1fr; }
            header h1 { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐋 WEEX 莊家監控 Pro</h1>
            <p>即時價格追蹤 · 大單閾值監控 · 入場信號判斷</p>
        </header>
        
        <div class="status-bar" id="statusBar">
            <div class="status-pill status-connecting" id="apiStatus">
                <span class="dot"></span>
                <span>API: 等待啟動</span>
            </div>
            <div class="status-pill" style="background:#1f2937;">
                <span>更新次數: <span id="updateCount">0</span></span>
            </div>
            <div class="status-pill" style="background:#1f2937;">
                <span>成功請求: <span id="successCount">0</span></span>
            </div>
            <div class="status-pill" style="background:#1f2937;">
                <span>失敗請求: <span id="failCount">0</span></span>
            </div>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label>莊家指數靈敏度</label>
                <select id="sensitivity">
                    <option value="low">低 (保守)</option>
                    <option value="medium" selected>中 (平衡)</option>
                    <option value="high">高 (激進)</option>
                </select>
            </div>
            <div class="control-group">
                <label>大單閾值 (USDT)</label>
                <input type="number" id="whaleThreshold" value="50000" min="1000" step="1000">
            </div>
            <div class="control-group">
                <label>輪詢間隔 (ms)</label>
                <input type="number" id="pollInterval" value="5000" min="2000" step="1000">
            </div>
            <div class="control-group">
                <label>數據源模式</label>
                <select id="dataMode">
                    <option value="single">單幣種輪詢 (穩定)</option>
                    <option value="batch" selected>批量全部幣種 (快速)</option>
                </select>
            </div>
            <button class="btn" id="startBtn" onclick="startMonitoring()">開始監控</button>
            <button class="btn btn-danger" id="stopBtn" onclick="stopMonitoring()" disabled>停止</button>
            <button class="btn" style="background:#1f2937;" onclick="testApiConnection()">測試 API</button>
        </div>
        
        <div id="apiTestResult"></div>
        
        <div class="coin-input-area">
            <input type="text" id="coinInput" placeholder="輸入幣種，例如：BTC, ETH, SOL, DOGE (用逗號分隔)" value="BTC,ETH,SOL,DOGE,XRP">
            <button class="btn" onclick="addCoins()">添加幣種</button>
        </div>
        
        <div class="grid" id="summaryCards">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">監控幣種數</span>
                </div>
                <div class="card-value" id="totalCoins">0</div>
                <div class="card-sub">活躍追蹤中</div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="card-title">莊家活躍度</span>
                </div>
                <div class="card-value neutral" id="whaleActivity">--</div>
                <div class="card-sub">大單成交比例</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="whaleProgress" style="width:0%;background:#fbbf24;"></div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="card-title">最佳入場機會</span>
                </div>
                <div class="card-value" id="bestOpportunity">--</div>
                <div class="card-sub" id="bestOpportunitySub">等待數據...</div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="card-title">平均漲跌幅 (24h)</span>
                </div>
                <div class="card-value" id="avgChange">--</div>
                <div class="card-sub">市場整體情緒</div>
            </div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>幣種</th>
                    <th>價格 (USDT)</th>
                    <th>24h 漲跌</th>
                    <th>24h 成交量</th>
                    <th>大單比例</th>
                    <th>莊家指數</th>
                    <th>入場信號</th>
                    <th>最後更新</th>
                </tr>
            </thead>
            <tbody id="coinTable">
                <tr>
                    <td colspan="8" style="text-align:center;color:#6b7280;padding:40px;">
                        📭 尚未加入任何幣種<br>
                        <span style="font-size:0.85em;">在上方輸入幣種開始監控</span>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div class="log-area" id="logArea">
            <div class="log-entry"><span class="log-time">[系統]</span> 等待啟動監控...</div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            SPOT_REST_BASE: 'https://api-spot.weex.com',
            // 正確的端點路徑根據官方文件
            ENDPOINTS: {
                ticker24h: '/api/v3/market/ticker/24hr',
                trades: '/api/v3/market/trades',
                price: '/api/v3/market/ticker/price',
                exchangeInfo: '/api/v3/exchangeInfo'
            }
        };
        
        // ==================== 狀態 ====================
        let state = {
            coins: new Map(), // symbol -> data
            restInterval: null,
            isMonitoring: false,
            updateCount: 0,
            successCount: 0,
            failCount: 0,
            whaleTrades: [],
            logs: [],
            lastPrices: new Map() // 用於追蹤價格變化
        };
        
        // ==================== 工具函數 ====================
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString('zh-TW');
            const logArea = document.getElementById('logArea');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${message}</span>`;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
            state.logs.push({ time, message, type });
            if (state.logs.length > 100) state.logs.shift();
        }
        
        function formatPrice(price) {
            if (price === undefined || price === null) return '--';
            const num = parseFloat(price);
            if (isNaN(num)) return '--';
            if (num >= 10000) return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            if (num >= 1) return num.toLocaleString('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 4 });
            return num.toLocaleString('en-US', { minimumFractionDigits: 6, maximumFractionDigits: 8 });
        }
        
        function formatVolume(vol) {
            if (!vol) return '--';
            const num = parseFloat(vol);
            if (isNaN(num)) return '--';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return num.toFixed(2);
        }
        
        function getSymbolPair(symbol) {
            return `${symbol.toUpperCase()}USDT`;
        }
        
        // ==================== API 請求核心 ====================
        // 使用多種 CORS 代理策略
        async function fetchWithCors(url) {
            // 策略 1: 直接請求（某些瀏覽器擴展或環境可能允許）
            try {
                const response = await fetch(url, { 
                    method: 'GET',
                    headers: { 'Accept': 'application/json' },
                    mode: 'cors'
                });
                if (response.ok) return await response.json();
            } catch (e) {}
            
            // 策略 2: 使用 corsproxy.io
            try {
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                if (response.ok) return await response.json();
            } catch (e) {}
            
            // 策略 3: 使用 allorigins
            try {
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                if (response.ok) return await response.json();
            } catch (e) {}
            
            // 策略 4: 使用 cors-anywhere
            try {
                const proxyUrl = `https://cors-anywhere.herokuapp.com/${url}`;
                const response = await fetch(proxyUrl);
                if (response.ok) return await response.json();
            } catch (e) {}
            
            throw new Error('所有請求策略均失敗');
        }
        
        // ==================== REST API 函數 ====================
        async function fetchTicker24h(symbol) {
            const pair = getSymbolPair(symbol);
            const url = `${CONFIG.SPOT_REST_BASE}${CONFIG.ENDPOINTS.ticker24h}?symbol=${pair}`;
            return await fetchWithCors(url);
        }
        
        async function fetchTrades(symbol, limit = 50) {
            const pair = getSymbolPair(symbol);
            const url = `${CONFIG.SPOT_REST_BASE}${CONFIG.ENDPOINTS.trades}?symbol=${pair}&limit=${limit}`;
            return await fetchWithCors(url);
        }
        
        async function fetchAllTickers() {
            const url = `${CONFIG.SPOT_REST_BASE}${CONFIG.ENDPOINTS.ticker24h}`;
            return await fetchWithCors(url);
        }
        
        // ==================== 莊家指數計算 ====================
        function calculateWhaleIndex(coinData, trades) {
            const sensitivity = document.getElementById('sensitivity').value;
            const threshold = parseFloat(document.getElementById('whaleThreshold').value) || 50000;
            
            let multiplier = 1;
            if (sensitivity === 'low') multiplier = 1.5;
            if (sensitivity === 'high') multiplier = 0.6;
            
            const adjustedThreshold = threshold * multiplier;
            
            let score = 50;
            let whaleRatio = 0;
            let buyPressure = 0.5;
            
            // 從成交數據分析大單
            if (trades && Array.isArray(trades) && trades.length > 0) {
                let whaleVolume = 0;
                let totalVolume = 0;
                let buyVolume = 0;
                let sellVolume = 0;
                
                trades.forEach(trade => {
                    const price = parseFloat(trade.price || trade.p || 0);
                    const qty = parseFloat(trade.qty || trade.q || trade.quantity || 0);
                    const quoteQty = parseFloat(trade.quoteQty || 0);
                    const value = quoteQty > 0 ? quoteQty : (price * qty);
                    
                    if (value > 0) {
                        totalVolume += value;
                        if (value >= adjustedThreshold) {
                            whaleVolume += value;
                        }
                        
                        const isBuyerMaker = trade.isBuyerMaker || trade.m || false;
                        if (isBuyerMaker) {
                            sellVolume += value;
                        } else {
                            buyVolume += value;
                        }
                    }
                });
                
                whaleRatio = totalVolume > 0 ? (whaleVolume / totalVolume) : 0;
                const totalPressure = buyVolume + sellVolume;
                buyPressure = totalPressure > 0 ? (buyVolume / totalPressure) : 0.5;
            }
            
            // 從 24h ticker 數據分析
            if (coinData) {
                const priceChange = parseFloat(coinData.priceChangePercent || coinData.P || 0);
                const volume = parseFloat(coinData.volume || coinData.v || 0);
                const quoteVolume = parseFloat(coinData.quoteVolume || coinData.q || 0);
                
                // 價格波動加成
                if (Math.abs(priceChange) > 3) score += 5;
                if (Math.abs(priceChange) > 5) score += 10;
                if (Math.abs(priceChange) > 10) score += 15;
                if (Math.abs(priceChange) > 20) score += 10;
                
                // 成交量異常
                if (quoteVolume > 1e7) score += 5;
                if (quoteVolume > 1e8) score += 10;
            }
            
            // 大單比例影響 (0~30分)
            score += whaleRatio * 30;
            
            // 買賣壓力影響
            if (buyPressure > 0.7) score += 10;
            else if (buyPressure > 0.6) score += 5;
            else if (buyPressure < 0.3) score -= 10;
            else if (buyPressure < 0.4) score -= 5;
            
            // 限制範圍
            score = Math.max(0, Math.min(100, score));
            
            return {
                score: Math.round(score),
                whaleRatio: whaleRatio,
                buyPressure: buyPressure,
                threshold: adjustedThreshold
            };
        }
        
        function getSignal(whaleIndex, priceChange) {
            const score = whaleIndex.score;
            const change = parseFloat(priceChange) || 0;
            
            if (score >= 80 && change > 0) return { text: '強力買入', class: 'signal-strong-buy', icon: '🚀' };
            if (score >= 65 && change > -2) return { text: '買入', class: 'signal-buy', icon: '👆' };
            if (score <= 20 && change < 0) return { text: '賣出', class: 'signal-sell', icon: '👇' };
            if (score <= 35) return { text: '觀望', class: 'signal-sell', icon: '⚠️' };
            return { text: '持有', class: 'signal-hold', icon: '➖' };
        }
        
        // ==================== UI 更新 ====================
        function updateApiStatus(status, text) {
            const el = document.getElementById('apiStatus');
            el.className = `status-pill status-${status}`;
            el.querySelector('span:last-child').textContent = text;
        }
        
        function updateTable() {
            const tbody = document.getElementById('coinTable');
            if (state.coins.size === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" style="text-align:center;color:#6b7280;padding:40px;">
                            📭 尚未加入任何幣種<br>
                            <span style="font-size:0.85em;">在上方輸入幣種開始監控</span>
                        </td>
                    </tr>
                `;
                return;
            }
            
            let html = '';
            let totalWhaleScore = 0;
            let bestCoin = null;
            let bestScore = -1;
            let totalChange = 0;
            let activeCoins = 0;
            
            state.coins.forEach((data, symbol) => {
                // 只顯示有有效數據的幣種
                if (!data || !data.lastPrice) return;
                
                activeCoins++;
                const price = data.lastPrice;
                const change = data.priceChangePercent || 0;
                const volume = data.volume || 0;
                const quoteVolume = data.quoteVolume || 0;
                
                const whaleIndex = calculateWhaleIndex(data, data.trades);
                const signal = getSignal(whaleIndex, change);
                
                totalWhaleScore += whaleIndex.score;
                totalChange += parseFloat(change) || 0;
                
                if (whaleIndex.score > bestScore) {
                    bestScore = whaleIndex.score;
                    bestCoin = { symbol, signal, score: whaleIndex.score, change };
                }
                
                const changeClass = parseFloat(change) >= 0 ? 'positive' : 'negative';
                const changeIcon = parseFloat(change) >= 0 ? '▲' : '▼';
                
                const whaleDots = Array(5).fill(0).map((_, i) => 
                    `<span class="whale-dot ${i < Math.round(whaleIndex.whaleRatio * 5) ? 'active' : ''}"></span>`
                ).join('');
                
                const lastUpdate = data.lastUpdate ? 
                    new Date(data.lastUpdate).toLocaleTimeString('zh-TW') : '--';
                
                // 價格變化指示
                const lastPrice = state.lastPrices.get(symbol);
                let priceIndicator = '';
                if (lastPrice && parseFloat(price) !== lastPrice) {
                    priceIndicator = parseFloat(price) > lastPrice ? 
                        '<span style="color:#34d399;">↗</span>' : 
                        '<span style="color:#f87171;">↘</span>';
                }
                state.lastPrices.set(symbol, parseFloat(price));
                
                html += `
                    <tr>
                        <td><strong>${symbol}</strong>/USDT</td>
                        <td style="font-family:monospace;font-size:1.1em;">
                            ${formatPrice(price)} ${priceIndicator}
                        </td>
                        <td class="${changeClass}">${changeIcon} ${Math.abs(parseFloat(change)).toFixed(2)}%</td>
                        <td>${formatVolume(quoteVolume)}</td>
                        <td>
                            <div class="whale-indicator">${whaleDots}</div>
                            <div style="font-size:0.75em;color:#6b7280;margin-top:2px;">${(whaleIndex.whaleRatio * 100).toFixed(1)}%</div>
                        </td>
                        <td>
                            <div style="font-size:1.2em;font-weight:700;color:${whaleIndex.score >= 70 ? '#34d399' : whaleIndex.score <= 30 ? '#f87171' : '#fbbf24'};">
                                ${whaleIndex.score}
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width:${whaleIndex.score}%;background:${whaleIndex.score >= 70 ? '#34d399' : whaleIndex.score <= 30 ? '#f87171' : '#fbbf24'};"></div>
                            </div>
                        </td>
                        <td><span class="signal ${signal.class}">${signal.icon} ${signal.text}</span></td>
                        <td style="color:#6b7280;font-size:0.8em;">${lastUpdate}</td>
                    </tr>
                `;
            });
            
            if (activeCoins === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" style="text-align:center;color:#6b7280;padding:40px;">
                            ⏳ 正在獲取數據...<br>
                            <span style="font-size:0.85em;">如果持續無數據，請點擊「測試 API」檢查連線</span>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = html;
            
            // 更新摘要卡片
            document.getElementById('totalCoins').textContent = activeCoins;
            
            const avgWhaleScore = activeCoins > 0 ? (totalWhaleScore / activeCoins) : 0;
            const whaleActivityEl = document.getElementById('whaleActivity');
            whaleActivityEl.textContent = avgWhaleScore >= 60 ? '活躍' : avgWhaleScore >= 40 ? '一般' : '低迷';
            whaleActivityEl.className = `card-value ${avgWhaleScore >= 60 ? 'positive' : avgWhaleScore >= 40 ? 'neutral' : 'negative'}`;
            document.getElementById('whaleProgress').style.width = `${avgWhaleScore}%`;
            
            if (bestCoin) {
                const bestEl = document.getElementById('bestOpportunity');
                bestEl.innerHTML = `${bestCoin.symbol} <span style="font-size:0.6em;">${bestCoin.signal.icon}</span>`;
                bestEl.className = `card-value ${bestCoin.change >= 0 ? 'positive' : 'negative'}`;
                document.getElementById('bestOpportunitySub').textContent = 
                    `莊家指數 ${bestCoin.score} · ${bestCoin.signal.text}`;
            }
            
            const avgChange = activeCoins > 0 ? (totalChange / activeCoins) : 0;
            const avgChangeEl = document.getElementById('avgChange');
            avgChangeEl.textContent = `${avgChange >= 0 ? '+' : ''}${avgChange.toFixed(2)}%`;
            avgChangeEl.className = `card-value ${avgChange >= 0 ? 'positive' : 'negative'}`;
        }
        
        // ==================== 核心監控邏輯 ====================
        async function updateCoinData(symbol) {
            try {
                const tickerData = await fetchTicker24h(symbol);
                
                if (tickerData && (tickerData.lastPrice || tickerData.price)) {
                    // 處理不同格式的回應
                    const normalizedData = {
                        symbol: symbol,
                        lastPrice: tickerData.lastPrice || tickerData.price || tickerData.c,
                        priceChange: tickerData.priceChange || tickerData.p,
                        priceChangePercent: tickerData.priceChangePercent || tickerData.P,
                        highPrice: tickerData.highPrice || tickerData.h,
                        lowPrice: tickerData.lowPrice || tickerData.l,
                        volume: tickerData.volume || tickerData.v,
                        quoteVolume: tickerData.quoteVolume || tickerData.q,
                        openPrice: tickerData.openPrice || tickerData.o,
                        bidPrice: tickerData.bidPrice || tickerData.b,
                        askPrice: tickerData.askPrice || tickerData.a,
                        lastUpdate: Date.now()
                    };
                    
                    // 獲取現有數據並合併
                    const existing = state.coins.get(symbol) || {};
                    state.coins.set(symbol, { ...existing, ...normalizedData });
                    
                    state.successCount++;
                    return true;
                }
                return false;
            } catch (error) {
                state.failCount++;
                log(`${symbol} Ticker 獲取失敗: ${error.message}`, 'error');
                return false;
            }
        }
        
        async function updateCoinTrades(symbol) {
            try {
                const tradesData = await fetchTrades(symbol, 50);
                if (tradesData && Array.isArray(tradesData)) {
                    const coin = state.coins.get(symbol);
                    if (coin) {
                        coin.trades = tradesData;
                        state.coins.set(symbol, coin);
                    }
                    return true;
                }
                return false;
            } catch (error) {
                // 交易數據失敗不影響主要功能
                return false;
            }
        }
        
        async function pollRestData() {
            if (!state.isMonitoring) return;
            
            updateApiStatus('connecting', 'API: 更新中...');
            
            const symbols = Array.from(state.coins.keys());
            const dataMode = document.getElementById('dataMode').value;
            let updatedCount = 0;
            
            if (dataMode === 'batch' && symbols.length > 0) {
                // 批量模式：先獲取所有幣種數據，再分配
                try {
                    const allTickers = await fetchAllTickers();
                    if (allTickers && Array.isArray(allTickers)) {
                        allTickers.forEach(ticker => {
                            const symbol = ticker.symbol ? ticker.symbol.replace('USDT', '') : '';
                            if (state.coins.has(symbol)) {
                                const normalizedData = {
                                    symbol: symbol,
                                    lastPrice: ticker.lastPrice,
                                    priceChange: ticker.priceChange,
                                    priceChangePercent: ticker.priceChangePercent,
                                    highPrice: ticker.highPrice,
                                    lowPrice: ticker.lowPrice,
                                    volume: ticker.volume,
                                    quoteVolume: ticker.quoteVolume,
                                    openPrice: ticker.openPrice,
                                    bidPrice: ticker.bidPrice,
                                    askPrice: ticker.askPrice,
                                    lastUpdate: Date.now()
                                };
                                const existing = state.coins.get(symbol) || {};
                                state.coins.set(symbol, { ...existing, ...normalizedData });
                                updatedCount++;
                            }
                        });
                        
                        // 獲取交易數據
                        for (const symbol of symbols) {
                            await updateCoinTrades(symbol);
                            await new Promise(r => setTimeout(r, 100)); // 避免請求過快
                        }
                    }
                } catch (error) {
                    log('批量獲取失敗，切換到單幣種模式', 'warn');
                    // 失敗時切換到單幣種模式
                    for (const symbol of symbols) {
                        const success = await updateCoinData(symbol);
                        if (success) updatedCount++;
                        await new Promise(r => setTimeout(r, 200));
                    }
                }
            } else {
                // 單幣種輪詢模式
                for (const symbol of symbols) {
                    const success = await updateCoinData(symbol);
                    if (success) {
                        updatedCount++;
                        await updateCoinTrades(symbol);
                    }
                    await new Promise(r => setTimeout(r, 200));
                }
            }
            
            // 更新 UI
            state.updateCount++;
            document.getElementById('updateCount').textContent = state.updateCount;
            document.getElementById('successCount').textContent = state.successCount;
            document.getElementById('failCount').textContent = state.failCount;
            
            if (updatedCount > 0) {
                updateApiStatus('connected', `API: 已更新 ${updatedCount}/${symbols.length} 幣種`);
                updateTable();
            } else {
                updateApiStatus('error', 'API: 更新失敗，檢查網路或 API 狀態');
            }
        }
        
        async function startMonitoring() {
            if (state.isMonitoring) return;
            
            const coinInput = document.getElementById('coinInput').value.trim();
            if (!coinInput && state.coins.size === 0) {
                log('請先輸入要監控的幣種', 'warn');
                return;
            }
            
            // 解析幣種
            if (coinInput) {
                const newCoins = coinInput.split(/[,，\s]+/).filter(c => c.trim());
                newCoins.forEach(coin => {
                    const symbol = coin.toUpperCase().replace('USDT', '').replace('/', '');
                    if (!state.coins.has(symbol) && state.coins.size < 20) {
                        state.coins.set(symbol, { symbol, lastUpdate: null });
                    }
                });
            }
            
            if (state.coins.size === 0) {
                log('沒有有效的幣種可監控', 'warn');
                return;
            }
            
            state.isMonitoring = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            
            log(`開始監控 ${state.coins.size} 個幣種...`, 'success');
            
            // 立即執行一次
            await pollRestData();
            
            // 設定定時輪詢
            const interval = parseInt(document.getElementById('pollInterval').value) || 5000;
            state.restInterval = setInterval(pollRestData, interval);
        }
        
        function stopMonitoring() {
            state.isMonitoring = false;
            
            if (state.restInterval) {
                clearInterval(state.restInterval);
                state.restInterval = null;
            }
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            
            updateApiStatus('error', 'API: 已停止');
            log('監控已停止', 'warn');
        }
        
        function addCoins() {
            const coinInput = document.getElementById('coinInput').value.trim();
            if (!coinInput) {
                log('請輸入幣種', 'warn');
                return;
            }
            
            const newCoins = coinInput.split(/[,，\s]+/).filter(c => c.trim());
            let added = 0;
            
            newCoins.forEach(coin => {
                const symbol = coin.toUpperCase().replace('USDT', '').replace('/', '');
                if (!state.coins.has(symbol) && state.coins.size < 20) {
                    state.coins.set(symbol, { symbol, lastUpdate: null });
                    added++;
                }
            });
            
            if (added > 0) {
                log(`已添加 ${added} 個幣種`, 'success');
                updateTable();
                // 如果正在監控，立即更新新幣種
                if (state.isMonitoring) {
                    pollRestData();
                }
            } else {
                log('沒有新幣種被添加（可能已存在或達到上限 20 個）', 'warn');
            }
        }
        
        // ==================== API 測試 ====================
        async function testApiConnection() {
            const resultDiv = document.getElementById('apiTestResult');
            resultDiv.innerHTML = '<div class="api-test-result" style="background:#1f2937;">🔄 測試 API 連線中...</div>';
            
            const tests = [];
            
            // 測試 1: Ping
            try {
                const pingUrl = `${CONFIG.SPOT_REST_BASE}/api/v3/ping`;
                const pingData = await fetchWithCors(pingUrl);
                tests.push({ name: 'Ping', success: true, data: pingData });
            } catch (e) {
                tests.push({ name: 'Ping', success: false, error: e.message });
            }
            
            // 測試 2: BTC Ticker
            try {
                const btcData = await fetchTicker24h('BTC');
                tests.push({ name: 'BTC 24h Ticker', success: true, data: btcData });
            } catch (e) {
                tests.push({ name: 'BTC 24h Ticker', success: false, error: e.message });
            }
            
            // 測試 3: BTC Trades
            try {
                const tradesData = await fetchTrades('BTC', 5);
                tests.push({ name: 'BTC Trades', success: true, data: tradesData });
            } catch (e) {
                tests.push({ name: 'BTC Trades', success: false, error: e.message });
            }
            
            // 顯示結果
            let html = '';
            let allSuccess = true;
            
            tests.forEach(test => {
                if (test.success) {
                    html += `<div class="api-test-result api-test-success">✅ ${test.name}: 成功</div>`;
                } else {
                    html += `<div class="api-test-result api-test-fail">❌ ${test.name}: 失敗 - ${test.error}</div>`;
                    allSuccess = false;
                }
            });
            
            if (allSuccess) {
                html += `<div class="api-test-result api-test-success">🎉 所有 API 測試通過！可以開始監控</div>`;
            } else {
                html += `<div class="api-test-result api-test-fail">⚠️ 部分 API 測試失敗，請檢查網路或稍後再試</div>`;
            }
            
            resultDiv.innerHTML = html;
            
            // 記錄到日誌
            tests.forEach(test => {
                if (test.success) {
                    log(`API 測試 ${test.name}: 成功`, 'success');
                } else {
                    log(`API 測試 ${test.name}: 失敗 - ${test.error}`, 'error');
                }
            });
        }
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            log('WEEX 莊家監控 Pro 已載入', 'info');
            log('建議先點擊「測試 API」確認連線正常', 'info');
            
            // 預設載入幣種但不啟動
            const defaultCoins = ['BTC', 'ETH', 'SOL', 'DOGE', 'XRP'];
            defaultCoins.forEach(coin => {
                state.coins.set(coin, { symbol: coin, lastUpdate: null });
            });
            updateTable();
        });
        
        // 頁面離開時清理
        window.addEventListener('beforeunload', () => {
            stopMonitoring();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEEX 莊家監控 Pro - 即時價格與入場判斷</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: #0a0e1a;
            color: #e0e6ed;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #1a2332;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 2.2em;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        header p { color: #8892a0; font-size: 0.95em; }
        
        .controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            padding: 20px;
            background: #111827;
            border-radius: 12px;
            border: 1px solid #1f2937;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .control-group label {
            font-size: 0.8em;
            color: #8892a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .control-group input, .control-group select {
            background: #1f2937;
            border: 1px solid #374151;
            color: #e0e6ed;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9em;
            min-width: 140px;
        }
        .control-group input:focus, .control-group select:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .btn {
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s;
            align-self: flex-end;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,212,255,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
        
        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .status-pill {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-pill .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .status-connecting { background: #1e3a5f; color: #60a5fa; }
        .status-connected { background: #064e3b; color: #34d399; }
        .status-error { background: #450a0a; color: #f87171; }
        .status-pill.status-connecting .dot { background: #60a5fa; }
        .status-pill.status-connected .dot { background: #34d399; }
        .status-pill.status-error .dot { background: #f87171; animation: none; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .card {
            background: #111827;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1f2937;
            transition: border-color 0.3s;
        }
        .card:hover { border-color: #374151; }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .card-title {
            font-size: 1em;
            color: #8892a0;
            font-weight: 500;
        }
        .card-value {
            font-size: 1.8em;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }
        .card-sub {
            font-size: 0.8em;
            color: #6b7280;
            margin-top: 5px;
        }
        .positive { color: #34d399; }
        .negative { color: #f87171; }
        .neutral { color: #fbbf24; }
        
        .coin-input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .coin-input-area input {
            flex: 1;
            background: #1f2937;
            border: 1px solid #374151;
            color: #e0e6ed;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1em;
        }
        .coin-input-area input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #111827;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1f2937;
        }
        th {
            background: #1f2937;
            padding: 14px 16px;
            text-align: left;
            font-size: 0.8em;
            color: #8892a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        td {
            padding: 14px 16px;
            border-bottom: 1px solid #1f2937;
            font-size: 0.9em;
        }
        tr:hover td { background: #1a2332; }
        tr:last-child td { border-bottom: none; }
        
        .signal {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
        }
        .signal-buy { background: rgba(52,211,153,0.15); color: #34d399; }
        .signal-sell { background: rgba(248,113,113,0.15); color: #f87171; }
        .signal-hold { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .signal-strong-buy { background: rgba(52,211,153,0.3); color: #34d399; border: 1px solid #34d399; }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1f2937;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 6px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .log-area {
            background: #0d1117;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 15px;
            margin-top: 25px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            color: #6b7280;
        }
        .log-entry { margin-bottom: 4px; }
        .log-time { color: #4b5563; }
        .log-info { color: #60a5fa; }
        .log-success { color: #34d399; }
        .log-error { color: #f87171; }
        .log-warn { color: #fbbf24; }
        
        .whale-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .whale-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #6b7280;
        }
        .whale-dot.active {
            background: #fbbf24;
            box-shadow: 0 0 8px #fbbf24;
        }
        
        @media (max-width: 768px) {
            .controls { flex-direction: column; }
            .grid { grid-template-columns: 1fr; }
            header h1 { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐋 WEEX 莊家監控 Pro</h1>
            <p>即時價格追蹤 · 大單閾值監控 · 入場信號判斷</p>
        </header>
        
        <div class="status-bar" id="statusBar">
            <div class="status-pill status-connecting" id="wsStatus">
                <span class="dot"></span>
                <span>WebSocket: 初始化中...</span>
            </div>
            <div class="status-pill status-connecting" id="restStatus">
                <span class="dot"></span>
                <span>REST API: 等待中...</span>
            </div>
            <div class="status-pill" style="background:#1f2937;">
                <span>更新次數: <span id="updateCount">0</span></span>
            </div>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label>莊家指數靈敏度</label>
                <select id="sensitivity">
                    <option value="low">低 (保守)</option>
                    <option value="medium" selected>中 (平衡)</option>
                    <option value="high">高 (激進)</option>
                </select>
            </div>
            <div class="control-group">
                <label>大單閾值 (USDT)</label>
                <input type="number" id="whaleThreshold" value="50000" min="1000" step="1000">
            </div>
            <div class="control-group">
                <label>REST 輪詢間隔 (ms)</label>
                <input type="number" id="pollInterval" value="3000" min="1000" step="500">
            </div>
            <div class="control-group">
                <label>數據源</label>
                <select id="dataSource">
                    <option value="rest">REST API (穩定)</option>
                    <option value="websocket">WebSocket (即時)</option>
                    <option value="both" selected>雙軌並行</option>
                </select>
            </div>
            <button class="btn" id="startBtn" onclick="startMonitoring()">開始監控</button>
            <button class="btn btn-danger" id="stopBtn" onclick="stopMonitoring()" disabled>停止</button>
        </div>
        
        <div class="coin-input-area">
            <input type="text" id="coinInput" placeholder="輸入幣種，例如：BTC, ETH, SOL, DOGE (用逗號分隔)" value="BTC,ETH,SOL,DOGE,XRP,PEPE,WIF">
            <button class="btn" onclick="addCoins()">添加幣種</button>
        </div>
        
        <div class="grid" id="summaryCards">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">監控幣種數</span>
                </div>
                <div class="card-value" id="totalCoins">0</div>
                <div class="card-sub">活躍追蹤中</div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="card-title">莊家活躍度</span>
                </div>
                <div class="card-value neutral" id="whaleActivity">--</div>
                <div class="card-sub">大單成交比例</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="whaleProgress" style="width:0%;background:#fbbf24;"></div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="card-title">最佳入場機會</span>
                </div>
                <div class="card-value" id="bestOpportunity">--</div>
                <div class="card-sub" id="bestOpportunitySub">等待數據...</div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="card-title">平均漲跌幅 (24h)</span>
                </div>
                <div class="card-value" id="avgChange">--</div>
                <div class="card-sub">市場整體情緒</div>
            </div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>幣種</th>
                    <th>價格 (USDT)</th>
                    <th>24h 漲跌</th>
                    <th>24h 成交量</th>
                    <th>大單比例</th>
                    <th>莊家指數</th>
                    <th>入場信號</th>
                    <th>最後更新</th>
                </tr>
            </thead>
            <tbody id="coinTable">
                <tr>
                    <td colspan="8" style="text-align:center;color:#6b7280;padding:40px;">
                        📭 尚未加入任何幣種<br>
                        <span style="font-size:0.85em;">在上方輸入幣種開始監控</span>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div class="log-area" id="logArea">
            <div class="log-entry"><span class="log-time">[系統]</span> 等待啟動監控...</div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            SPOT_REST_BASE: 'https://api-spot.weex.com',
            CONTRACT_REST_BASE: 'https://api-contract.weex.com',
            CONTRACT_WS: 'wss://ws-contract.weex.com/v2/ws/public',
            SPOT_WS: 'wss://ws-spot.weex.com/v2/ws/public', // 推測的 Spot WebSocket
            DEFAULT_COINS: ['BTC', 'ETH', 'SOL', 'DOGE', 'XRP'],
            MAX_COINS: 20
        };
        
        // ==================== 狀態 ====================
        let state = {
            coins: new Map(), // symbol -> data
            ws: null,
            wsConnected: false,
            restInterval: null,
            isMonitoring: false,
            updateCount: 0,
            whaleTrades: [], // 最近的大單成交
            logs: []
        };
        
        // ==================== 工具函數 ====================
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString('zh-TW');
            const logArea = document.getElementById('logArea');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${message}</span>`;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
            state.logs.push({ time, message, type });
            if (state.logs.length > 100) state.logs.shift();
        }
        
        function formatPrice(price) {
            if (!price) return '--';
            const num = parseFloat(price);
            if (num >= 1000) return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            if (num >= 1) return num.toLocaleString('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 4 });
            return num.toLocaleString('en-US', { minimumFractionDigits: 6, maximumFractionDigits: 8 });
        }
        
        function formatVolume(vol) {
            if (!vol) return '--';
            const num = parseFloat(vol);
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return num.toFixed(2);
        }
        
        function getSymbolPair(symbol) {
            return `${symbol.toUpperCase()}USDT`;
        }
        
        // ==================== REST API ====================
        async function fetchSpotTicker(symbol) {
            try {
                const pair = getSymbolPair(symbol);
                // 使用 CORS proxy 避免跨域問題
                const proxyUrls = [
                    `https://corsproxy.io/?${encodeURIComponent(`${CONFIG.SPOT_REST_BASE}/api/v3/market/ticker/24hr?symbol=${pair}`)}`,
                    `https://api.allorigins.win/raw?url=${encodeURIComponent(`${CONFIG.SPOT_REST_BASE}/api/v3/market/ticker/24hr?symbol=${pair}`)}`
                ];
                
                let lastError;
                for (const url of proxyUrls) {
                    try {
                        const response = await fetch(url, { 
                            method: 'GET',
                            headers: { 'Accept': 'application/json' }
                        });
                        if (response.ok) {
                            const data = await response.json();
                            return data;
                        }
                    } catch (e) { lastError = e; }
                }
                throw lastError || new Error('All proxies failed');
            } catch (error) {
                // 嘗試直接請求（某些環境可能允許）
                try {
                    const pair = getSymbolPair(symbol);
                    const response = await fetch(`${CONFIG.SPOT_REST_BASE}/api/v3/market/ticker/24hr?symbol=${pair}`);
                    if (response.ok) return await response.json();
                } catch (e) {}
                throw error;
            }
        }
        
        async function fetchSpotTrades(symbol, limit = 50) {
            try {
                const pair = getSymbolPair(symbol);
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(`${CONFIG.SPOT_REST_BASE}/api/v3/market/trades?symbol=${pair}&limit=${limit}`)}`;
                const response = await fetch(proxyUrl);
                if (response.ok) return await response.json();
                return null;
            } catch (e) {
                return null;
            }
        }
        
        async function fetchAllSpotTickers() {
            try {
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(`${CONFIG.SPOT_REST_BASE}/api/v3/market/ticker/24hr`)}`;
                const response = await fetch(proxyUrl);
                if (response.ok) {
                    const data = await response.json();
                    return Array.isArray(data) ? data : (data.data || []);
                }
                return null;
            } catch (e) {
                return null;
            }
        }
        
        // ==================== 莊家指數計算 ====================
        function calculateWhaleIndex(coinData, trades) {
            const sensitivity = document.getElementById('sensitivity').value;
            const threshold = parseFloat(document.getElementById('whaleThreshold').value) || 50000;
            
            let multiplier = 1;
            if (sensitivity === 'low') multiplier = 1.5;
            if (sensitivity === 'high') multiplier = 0.6;
            
            const adjustedThreshold = threshold * multiplier;
            
            // 基礎分數
            let score = 50;
            let whaleRatio = 0;
            let buyPressure = 0;
            
            // 從成交數據分析
            if (trades && Array.isArray(trades)) {
                let whaleVolume = 0;
                let totalVolume = 0;
                let buyVolume = 0;
                let sellVolume = 0;
                
                trades.forEach(trade => {
                    const price = parseFloat(trade.p || trade.price || 0);
                    const qty = parseFloat(trade.q || trade.qty || trade.quantity || 0);
                    const isBuyerMaker = trade.m || trade.isBuyerMaker || false;
                    const value = price * qty;
                    
                    totalVolume += value;
                    if (value >= adjustedThreshold) {
                        whaleVolume += value;
                    }
                    if (isBuyerMaker) {
                        sellVolume += value; // 買方是 maker = 賣壓
                    } else {
                        buyVolume += value; // 買方是 taker = 買壓
                    }
                });
                
                whaleRatio = totalVolume > 0 ? (whaleVolume / totalVolume) : 0;
                buyPressure = (buyVolume + sellVolume) > 0 ? (buyVolume / (buyVolume + sellVolume)) : 0.5;
            }
            
            // 從 24h 數據分析
            if (coinData) {
                const priceChange = parseFloat(coinData.priceChangePercent || coinData.P || 0);
                const volume = parseFloat(coinData.volume || coinData.v || 0);
                const quoteVolume = parseFloat(coinData.quoteVolume || coinData.q || 0);
                
                // 價格波動加分
                if (Math.abs(priceChange) > 5) score += 10;
                if (Math.abs(priceChange) > 10) score += 15;
                
                // 成交量異常加分
                const avgPrice = quoteVolume / (volume || 1);
                if (avgPrice > 0 && quoteVolume > 1e7) score += 10;
            }
            
            // 大單比例影響
            score += whaleRatio * 30;
            
            // 買賣壓力影響
            if (buyPressure > 0.6) score += 10;
            if (buyPressure < 0.4) score -= 10;
            
            // 限制範圍
            score = Math.max(0, Math.min(100, score));
            
            return {
                score: Math.round(score),
                whaleRatio: whaleRatio,
                buyPressure: buyPressure,
                threshold: adjustedThreshold
            };
        }
        
        function getSignal(whaleIndex, priceChange) {
            const score = whaleIndex.score;
            const change = parseFloat(priceChange) || 0;
            
            if (score >= 80 && change > 0) return { text: '強力買入', class: 'signal-strong-buy', icon: '🚀' };
            if (score >= 65 && change > -2) return { text: '買入', class: 'signal-buy', icon: '👆' };
            if (score <= 20 && change < 0) return { text: '賣出', class: 'signal-sell', icon: '👇' };
            if (score <= 35) return { text: '觀望', class: 'signal-sell', icon: '⚠️' };
            return { text: '持有', class: 'signal-hold', icon: '➖' };
        }
        
        // ==================== WebSocket ====================
        function connectWebSocket() {
            if (state.ws) {
                try { state.ws.close(); } catch (e) {}
            }
            
            const dataSource = document.getElementById('dataSource').value;
            if (dataSource === 'rest') {
                updateWsStatus('disabled', 'WebSocket: 已禁用');
                return;
            }
            
            updateWsStatus('connecting', 'WebSocket: 連線中...');
            
            // 嘗試連接 Spot WebSocket
            const wsUrl = CONFIG.SPOT_WS;
            state.ws = new WebSocket(wsUrl);
            
            state.ws.onopen = () => {
                state.wsConnected = true;
                updateWsStatus('connected', 'WebSocket: 已連線');
                log('WebSocket 連線成功', 'success');
                
                // 訂閱所有監控幣種的 ticker
                state.coins.forEach((_, symbol) => {
                    const pair = getSymbolPair(symbol).toLowerCase();
                    const subscribeMsg = {
                        method: "SUBSCRIBE",
                        params: [`${pair}@ticker`, `${pair}@trade`],
                        id: Date.now()
                    };
                    state.ws.send(JSON.stringify(subscribeMsg));
                });
            };
            
            state.ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleWebSocketData(data);
                } catch (e) {
                    // 忽略非 JSON 數據
                }
            };
            
            state.ws.onerror = (error) => {
                updateWsStatus('error', 'WebSocket: 連線錯誤');
                log('WebSocket 錯誤，嘗試重連...', 'error');
            };
            
            state.ws.onclose = () => {
                state.wsConnected = false;
                updateWsStatus('error', 'WebSocket: 已斷線');
                if (state.isMonitoring) {
                    setTimeout(() => {
                        if (state.isMonitoring) connectWebSocket();
                    }, 5000);
                }
            };
        }
        
        function handleWebSocketData(data) {
            if (data.e === '24hrTicker' || data.e === 'ticker') {
                const symbol = data.s ? data.s.replace('USDT', '') : '';
                if (state.coins.has(symbol)) {
                    const coinData = state.coins.get(symbol);
                    coinData.price = data.c || data.lastPrice;
                    coinData.change = data.P || data.priceChangePercent;
                    coinData.high = data.h || data.highPrice;
                    coinData.low = data.l || data.lowPrice;
                    coinData.volume = data.v || data.volume;
                    coinData.quoteVolume = data.q || data.quoteVolume;
                    coinData.lastUpdate = Date.now();
                    state.coins.set(symbol, coinData);
                }
            } else if (data.e === 'trade' || data.e === 'aggTrade') {
                const symbol = data.s ? data.s.replace('USDT', '') : '';
                const price = parseFloat(data.p || data.price || 0);
                const qty = parseFloat(data.q || data.quantity || 0);
                const value = price * qty;
                const threshold = parseFloat(document.getElementById('whaleThreshold').value) || 50000;
                
                if (value >= threshold) {
                    state.whaleTrades.push({
                        symbol,
                        value,
                        time: Date.now(),
                        isBuy: !(data.m || data.isBuyerMaker)
                    });
                    // 保留最近 100 筆
                    if (state.whaleTrades.length > 100) state.whaleTrades.shift();
                }
            }
        }
        
        // ==================== UI 更新 ====================
        function updateWsStatus(status, text) {
            const el = document.getElementById('wsStatus');
            el.className = `status-pill status-${status}`;
            el.querySelector('span:last-child').textContent = text;
        }
        
        function updateRestStatus(status, text) {
            const el = document.getElementById('restStatus');
            el.className = `status-pill status-${status}`;
            el.querySelector('span:last-child').textContent = text;
        }
        
        function updateTable() {
            const tbody = document.getElementById('coinTable');
            if (state.coins.size === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" style="text-align:center;color:#6b7280;padding:40px;">
                            📭 尚未加入任何幣種<br>
                            <span style="font-size:0.85em;">在上方輸入幣種開始監控</span>
                        </td>
                    </tr>
                `;
                return;
            }
            
            let html = '';
            let totalWhaleScore = 0;
            let bestCoin = null;
            let bestScore = -1;
            let totalChange = 0;
            
            state.coins.forEach((data, symbol) => {
                const price = data.price || data.lastPrice || '--';
                const change = data.change || data.priceChangePercent || 0;
                const volume = data.volume || data.v || 0;
                const quoteVolume = data.quoteVolume || data.q || 0;
                
                const whaleIndex = calculateWhaleIndex(data, data.trades);
                const signal = getSignal(whaleIndex, change);
                
                totalWhaleScore += whaleIndex.score;
                totalChange += parseFloat(change) || 0;
                
                if (whaleIndex.score > bestScore) {
                    bestScore = whaleIndex.score;
                    bestCoin = { symbol, signal, score: whaleIndex.score, change };
                }
                
                const changeClass = parseFloat(change) >= 0 ? 'positive' : 'negative';
                const changeIcon = parseFloat(change) >= 0 ? '▲' : '▼';
                
                const whaleDots = Array(5).fill(0).map((_, i) => 
                    `<span class="whale-dot ${i < Math.round(whaleIndex.whaleRatio * 5) ? 'active' : ''}"></span>`
                ).join('');
                
                const lastUpdate = data.lastUpdate ? 
                    new Date(data.lastUpdate).toLocaleTimeString('zh-TW') : '--';
                
                html += `
                    <tr>
                        <td><strong>${symbol}</strong>/USDT</td>
                        <td style="font-family:monospace;font-size:1.1em;">${formatPrice(price)}</td>
                        <td class="${changeClass}">${changeIcon} ${Math.abs(parseFloat(change)).toFixed(2)}%</td>
                        <td>${formatVolume(quoteVolume)}</td>
                        <td>
                            <div class="whale-indicator">${whaleDots}</div>
                            <div style="font-size:0.75em;color:#6b7280;margin-top:2px;">${(whaleIndex.whaleRatio * 100).toFixed(1)}%</div>
                        </td>
                        <td>
                            <div style="font-size:1.2em;font-weight:700;color:${whaleIndex.score >= 70 ? '#34d399' : whaleIndex.score <= 30 ? '#f87171' : '#fbbf24'};">
                                ${whaleIndex.score}
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width:${whaleIndex.score}%;background:${whaleIndex.score >= 70 ? '#34d399' : whaleIndex.score <= 30 ? '#f87171' : '#fbbf24'};"></div>
                            </div>
                        </td>
                        <td><span class="signal ${signal.class}">${signal.icon} ${signal.text}</span></td>
                        <td style="color:#6b7280;font-size:0.8em;">${lastUpdate}</td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
            
            // 更新摘要卡片
            document.getElementById('totalCoins').textContent = state.coins.size;
            
            const avgWhaleScore = state.coins.size > 0 ? (totalWhaleScore / state.coins.size) : 0;
            const whaleActivityEl = document.getElementById('whaleActivity');
            whaleActivityEl.textContent = avgWhaleScore >= 60 ? '活躍' : avgWhaleScore >= 40 ? '一般' : '低迷';
            whaleActivityEl.className = `card-value ${avgWhaleScore >= 60 ? 'positive' : avgWhaleScore >= 40 ? 'neutral' : 'negative'}`;
            document.getElementById('whaleProgress').style.width = `${avgWhaleScore}%`;
            
            if (bestCoin) {
                const bestEl = document.getElementById('bestOpportunity');
                bestEl.innerHTML = `${bestCoin.symbol} <span style="font-size:0.6em;">${bestCoin.signal.icon}</span>`;
                bestEl.className = `card-value ${bestCoin.change >= 0 ? 'positive' : 'negative'}`;
                document.getElementById('bestOpportunitySub').textContent = 
                    `莊家指數 ${bestCoin.score} · ${bestCoin.signal.text}`;
            }
            
            const avgChange = state.coins.size > 0 ? (totalChange / state.coins.size) : 0;
            const avgChangeEl = document.getElementById('avgChange');
            avgChangeEl.textContent = `${avgChange >= 0 ? '+' : ''}${avgChange.toFixed(2)}%`;
            avgChangeEl.className = `card-value ${avgChange >= 0 ? 'positive' : 'negative'}`;
        }
        
        // ==================== 核心監控邏輯 ====================
        async function pollRestData() {
            if (!state.isMonitoring) return;
            
            const dataSource = document.getElementById('dataSource').value;
            if (dataSource === 'websocket' && state.wsConnected) {
                updateRestStatus('connected', 'REST API: WebSocket 模式');
                return;
            }
            
            updateRestStatus('connecting', 'REST API: 更新中...');
            
            const symbols = Array.from(state.coins.keys());
            let successCount = 0;
            
            for (const symbol of symbols) {
                try {
                    // 獲取 24h ticker
                    const tickerData = await fetchSpotTicker(symbol);
                    if (tickerData) {
                        const existing = state.coins.get(symbol) || {};
                        state.coins.set(symbol, {
                            ...existing,
                            ...tickerData,
                            lastUpdate: Date.now()
                        });
                        successCount++;
                    }
                    
                    // 獲取最近成交（用於大單分析）
                    const tradesData = await fetchSpotTrades(symbol, 30);
                    if (tradesData && Array.isArray(tradesData)) {
                        const coin = state.coins.get(symbol);
                        if (coin) {
                            coin.trades = tradesData;
                            state.coins.set(symbol, coin);
                        }
                    }
                } catch (error) {
                    log(`${symbol} 數據獲取失敗: ${error.message}`, 'error');
                }
                
                // 小延遲避免請求過快
                await new Promise(r => setTimeout(r, 200));
            }
            
            if (successCount > 0) {
                updateRestStatus('connected', `REST API: 已更新 ${successCount}/${symbols.length}`);
                state.updateCount++;
                document.getElementById('updateCount').textContent = state.updateCount;
                updateTable();
            } else {
                updateRestStatus('error', 'REST API: 更新失敗');
            }
        }
        
        async function startMonitoring() {
            if (state.isMonitoring) return;
            
            const coinInput = document.getElementById('coinInput').value.trim();
            if (!coinInput && state.coins.size === 0) {
                log('請先輸入要監控的幣種', 'warn');
                return;
            }
            
            // 解析幣種
            if (coinInput) {
                const newCoins = coinInput.split(/[,，\s]+/).filter(c => c.trim());
                newCoins.forEach(coin => {
                    const symbol = coin.toUpperCase().replace('USDT', '').replace('/', '');
                    if (!state.coins.has(symbol) && state.coins.size < CONFIG.MAX_COINS) {
                        state.coins.set(symbol, { symbol, lastUpdate: null });
                    }
                });
            }
            
            if (state.coins.size === 0) {
                log('沒有有效的幣種可監控', 'warn');
                return;
            }
            
            state.isMonitoring = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            
            log(`開始監控 ${state.coins.size} 個幣種...`, 'success');
            
            // 連接 WebSocket
            const dataSource = document.getElementById('dataSource').value;
            if (dataSource !== 'rest') {
                connectWebSocket();
            }
            
            // 立即執行一次 REST 輪詢
            await pollRestData();
            
            // 設定定時輪詢
            const interval = parseInt(document.getElementById('pollInterval').value) || 3000;
            state.restInterval = setInterval(pollRestData, interval);
        }
        
        function stopMonitoring() {
            state.isMonitoring = false;
            
            if (state.restInterval) {
                clearInterval(state.restInterval);
                state.restInterval = null;
            }
            
            if (state.ws) {
                try { state.ws.close(); } catch (e) {}
                state.ws = null;
            }
            
            state.wsConnected = false;
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            
            updateWsStatus('error', 'WebSocket: 已停止');
            updateRestStatus('error', 'REST API: 已停止');
            
            log('監控已停止', 'warn');
        }
        
        function addCoins() {
            const coinInput = document.getElementById('coinInput').value.trim();
            if (!coinInput) {
                log('請輸入幣種', 'warn');
                return;
            }
            
            const newCoins = coinInput.split(/[,，\s]+/).filter(c => c.trim());
            let added = 0;
            
            newCoins.forEach(coin => {
                const symbol = coin.toUpperCase().replace('USDT', '').replace('/', '');
                if (!state.coins.has(symbol) && state.coins.size < CONFIG.MAX_COINS) {
                    state.coins.set(symbol, { symbol, lastUpdate: null });
                    added++;
                    
                    // 如果已在監控中，訂閱新幣種的 WebSocket
                    if (state.isMonitoring && state.wsConnected) {
                        const pair = getSymbolPair(symbol).toLowerCase();
                        const subscribeMsg = {
                            method: "SUBSCRIBE",
                            params: [`${pair}@ticker`, `${pair}@trade`],
                            id: Date.now()
                        };
                        state.ws.send(JSON.stringify(subscribeMsg));
                    }
                }
            });
            
            if (added > 0) {
                log(`已添加 ${added} 個幣種`, 'success');
                if (state.isMonitoring) {
                    updateTable();
                }
            } else {
                log('沒有新幣種被添加（可能已存在或達到上限）', 'warn');
            }
        }
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            log('WEEX 莊家監控 Pro 已載入', 'info');
            log('請輸入幣種並點擊「開始監控」', 'info');
            
            // 預設載入一些幣種但不啟動
            CONFIG.DEFAULT_COINS.forEach(coin => {
                state.coins.set(coin, { symbol: coin, lastUpdate: null });
            });
            updateTable();
        });
        
        // 頁面離開時清理
        window.addEventListener('beforeunload', () => {
            stopMonitoring();
        });
    </script>
</body>
</html>

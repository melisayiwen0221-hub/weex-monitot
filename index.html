<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WEEX 拉盤監控</title>
<style>
:root{--green:#3fb950;--red:#f85149;--yellow:#d29922;--blue:#58a6ff;--purple:#a371f7;--cyan:#39c5bb;--orange:#f0883e;--bg:#0d1117;--card:#161b22;--border:#30363d;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:#c9d1d9;padding:12px;min-height:100vh}
.header{text-align:center;padding:8px 0 12px}
.header h1{margin:0;font-size:22px;color:#fff;letter-spacing:1px}
.header .sub{font-size:12px;color:#8b949e;margin-top:4px}
.add-box{display:flex;gap:8px;margin-bottom:12px}
.add-box input{flex:1;background:#21262d;border:1px solid var(--border);color:#fff;padding:10px 14px;border-radius:8px;font-size:15px;outline:none}
.add-box input::placeholder{color:#6e7681}
.add-box button{background:var(--green);border:none;color:#fff;padding:10px 18px;border-radius:8px;font-weight:600;font-size:15px;cursor:pointer}
.add-box button:active{opacity:0.8}
.coin-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;position:relative}
.coin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.coin-name{font-size:18px;font-weight:700;color:#fff}
.coin-price{font-size:20px;font-weight:700;transition:all 0.3s}
.price-up{color:var(--green)}.price-down{color:var(--red)}
.price-flash-green{animation:flashGreen 0.5s}
.price-flash-red{animation:flashRed 0.5s}
@keyframes flashGreen{0%{background:rgba(63,185,80,0.3)}100%{background:transparent}}
@keyframes flashRed{0%{background:rgba(248,81,73,0.3)}100%{background:transparent}}
.coin-change{font-size:13px;padding:2px 8px;border-radius:6px;font-weight:600}
.change-up{background:rgba(63,185,80,0.15);color:var(--green)}
.change-down{background:rgba(248,81,73,0.15);color:var(--red)}
.delete-btn{position:absolute;top:10px;right:10px;background:transparent;border:none;color:#6e7681;font-size:20px;cursor:pointer;padding:6px 10px;z-index:10}
.delete-btn:active{color:var(--red);transform:scale(0.9)}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.metric{background:#21262d;padding:10px;border-radius:8px;text-align:center}
.metric-label{font-size:11px;color:#8b949e;margin-bottom:4px}
.metric-value{font-size:15px;font-weight:700}
.signal-box{padding:10px;border-radius:8px;margin-top:8px;font-size:14px;font-weight:600;text-align:center}
.signal-buy{background:rgba(63,185,80,0.1);border:1px solid rgba(63,185,80,0.3);color:var(--green)}
.signal-sell{background:rgba(248,81,73,0.1);border:1px solid rgba(248,81,73,0.3);color:var(--red)}
.signal-hold{background:rgba(88,166,255,0.1);border:1px solid rgba(88,166,255,0.3);color:var(--blue)}
.signal-short{background:rgba(163,113,247,0.1);border:1px solid rgba(163,113,247,0.3);color:var(--purple)}
.signal-wait{background:rgba(210,153,34,0.1);border:1px solid rgba(210,153,34,0.3);color:var(--yellow)}
.tp-sl{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.tp,.sl{padding:8px;border-radius:6px;text-align:center;font-size:13px;font-weight:600}
.tp{background:rgba(63,185,80,0.08);border:1px solid rgba(63,185,80,0.2);color:var(--green)}
.sl{background:rgba(248,81,73,0.08);border:1px solid rgba(248,81,73,0.2);color:var(--red)}
.strength-bar{height:6px;background:#21262d;border-radius:3px;margin-top:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.empty{text-align:center;padding:40px 20px;color:#6e7681;font-size:14px}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.status-live{background:var(--green)}.status-off{background:var(--red)}
.last-update{font-size:11px;color:#6e7681;text-align:center;margin-top:4px}
.volume-spike{color:var(--yellow);font-weight:700}
.api-status{padding:8px 14px;background:#21262d;border-radius:8px;margin-bottom:12px;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.whale-box{padding:10px;border-radius:8px;margin-top:8px;text-align:center;font-size:14px;font-weight:600}
.whale-in{background:rgba(57,197,187,0.08);border:1px solid rgba(57,197,187,0.25);color:var(--cyan)}
.whale-out{background:rgba(240,136,62,0.08);border:1px solid rgba(240,136,62,0.25);color:var(--orange)}
.whale-watch{background:rgba(210,153,34,0.08);border:1px solid rgba(210,153,34,0.25);color:var(--yellow)}
.entry-box{padding:10px;border-radius:8px;margin-top:8px;text-align:center;font-size:14px;font-weight:600}
.entry-yes{background:rgba(63,185,80,0.08);border:1px solid rgba(63,185,80,0.2);color:var(--green)}
.entry-no{background:rgba(248,81,73,0.08);border:1px solid rgba(248,81,73,0.2);color:var(--red)}
.entry-caution{background:rgba(210,153,34,0.08);border:1px solid rgba(210,153,34,0.2);color:var(--yellow)}
.entry-short{background:rgba(163,113,247,0.08);border:1px solid rgba(163,113,247,0.2);color:var(--purple)}
.alert-badge{position:absolute;top:10px;right:40px;background:var(--red);color:#fff;font-size:10px;padding:3px 8px;border-radius:10px;font-weight:700;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.history-mini{font-size:11px;color:#8b949e;margin-top:6px;text-align:center}
.data-age{font-size:10px;color:#6e768e;text-align:right;margin-top:4px}
.update-counter{font-size:11px;color:#8b949e;text-align:center;margin-top:4px}
</style>
</head>
<body>
<div class="header"><h1>🚀 WEEX 拉盤監控</h1><div class="sub">山寨幣莊家動向即時追蹤</div></div>

<div class="api-status" id="apiStatus">
  <span>🔌 API 狀態: 初始化中...</span>
  <span id="apiMode" style="color:var(--yellow)">--</span>
</div>

<div class="add-box">
  <input type="text" id="coinInput" placeholder="輸入幣種，如 BTC、ETH、PEPE" onkeypress="if(event.key==='Enter') addCoin()">
  <button onclick="addCoin()">➕ 加入監控</button>
</div>

<div id="coinList"></div>
<div class="last-update" id="lastUpdate"></div>
<div class="update-counter" id="updateCounter">已更新 0 次</div>

<script>
const REST_API = 'https://api-spot.weex.com';
const CORS_PROXY = 'https://corsproxy.io/?';
let updateCount = 0;
let apiWorking = false;
const COINS = [];
const COIN_DATA = {};
const PRICE_HISTORY = {};
let prevPrices = {};

function loadCoins(){try{const s=localStorage.getItem('weex_coins');if(s)JSON.parse(s).forEach(c=>{if(!COINS.includes(c))COINS.push(c)})}catch(e){}}
function saveCoins(){try{localStorage.setItem('weex_coins',JSON.stringify(COINS))}catch(e){}}

function getDecimals(sym){
  if(sym.includes('PEPE')) return 10;
  if(sym.includes('DOGE')||sym.includes('SHIB')) return 6;
  if(sym.includes('BTC')) return 2;
  if(sym.includes('ETH')) return 2;
  return 4;
}

function updateStatus(text, mode){
  document.getElementById('apiStatus').innerHTML = `<span>${text}</span>`;
  document.getElementById('apiMode').textContent = mode;
}

// 獲取最新價格（最即時）
async function fetchLatestPrice(symbol){
  try{
    const url = CORS_PROXY + encodeURIComponent(`${REST_API}/api/v3/market/ticker/price?symbols=${symbol}`);
    const res = await fetch(url);
    const data = await res.json();
    if(Array.isArray(data) && data.length > 0){
      return parseFloat(data[0].price || 0);
    }
  }catch(e){}
  return null;
}

// 獲取 24h 統計
async function fetch24hData(symbol){
  try{
    const url = CORS_PROXY + encodeURIComponent(`${REST_API}/api/v3/market/ticker/24hr?symbols=${symbol}`);
    const res = await fetch(url);
    const data = await res.json();
    if(Array.isArray(data) && data.length > 0){
      const d = data[0];
      return {
        last: parseFloat(d.lastPrice || d.last || 0),
        open: parseFloat(d.openPrice || d.open || 0),
        vol: parseFloat(d.volume || d.baseVolume || 0),
        high: parseFloat(d.highPrice || d.high || 0),
        low: parseFloat(d.lowPrice || d.low || 0)
      };
    }
  }catch(e){}
  return null;
}

// 獲取深度
async function fetchDepth(symbol){
  try{
    const url = CORS_PROXY + encodeURIComponent(`${REST_API}/api/v3/market/depth?symbol=${symbol}&limit=20`);
    const res = await fetch(url);
    const data = await res.json();
    if(data && data.bids){
      const bidSum = data.bids.reduce((a,b)=>a+parseFloat(b[0]||0)*parseFloat(b[1]||0),0);
      const askSum = data.asks.reduce((a,b)=>a+parseFloat(b[0]||0)*parseFloat(b[1]||0),0);
      return {bidDepth:(bidSum/1000000).toFixed(2)+'M',askDepth:(askSum/1000000).toFixed(2)+'M',bidSum,askSum};
    }
  }catch(e){}
  return {bidDepth:'--',askDepth:'--',bidSum:0,askSum:0};
}

function getMockData(symbol){
  const basePrices={BTCUSDT:65000,ETHUSDT:3500,DOGEUSDT:0.12,PEPEUSDT:0.000008,AKEUSDT:1.5};
  const base=basePrices[symbol]||1.5;
  const cycle=(Date.now()/30000)%100;
  let priceChange=0,whaleAction='neutral';
  if(cycle<20){priceChange=base*0.005;whaleAction='accumulating';}
  else if(cycle<40){priceChange=base*0.02;whaleAction='pumping';}
  else if(cycle<60){priceChange=base*0.003;whaleAction='holding';}
  else if(cycle<80){priceChange=-base*0.015;whaleAction='dumping';}
  else{priceChange=-base*0.005;whaleAction='exiting';}
  const price=base+priceChange+(Math.random()-0.5)*base*0.003;
  const changePct=((price-base)/base*100);
  const vol=50000000+Math.random()*200000000;
  if(!PRICE_HISTORY[symbol])PRICE_HISTORY[symbol]=[];
  PRICE_HISTORY[symbol].push({price,changePct,vol,whaleAction,time:Date.now()});
  if(PRICE_HISTORY[symbol].length>20)PRICE_HISTORY[symbol].shift();
  return{
    symbol,price:price.toFixed(getDecimals(symbol)),changePct:changePct.toFixed(2),
    volume:(vol/1000000).toFixed(2)+'M',volumeRaw:vol,
    high:(price*1.02).toFixed(getDecimals(symbol)),low:(price*0.98).toFixed(getDecimals(symbol)),
    timestamp:Date.now(),mock:true
  };
}

function analyzeCoin(symbol,data,depth){
  const history=PRICE_HISTORY[symbol]||[];
  const price=parseFloat(data.price);
  const change=parseFloat(data.changePct);
  const vol=data.volumeRaw;
  
  let whaleStatus='unknown',whaleText='❓ 莊家狀態不明',whaleClass='whale-watch';
  if(history.length>=5){
    const recent=history.slice(-5);
    const actions=recent.map(h=>h.whaleAction);
    const pumpCount=actions.filter(a=>a==='pumping'||a==='accumulating').length;
    const dumpCount=actions.filter(a=>a==='dumping'||a==='exiting').length;
    const avgVol=recent.reduce((a,b)=>a+b.vol,0)/recent.length;
    const volSpike=vol>avgVol*1.3;
    
    if(pumpCount>=3&&volSpike){whaleStatus='in';whaleText='🐋 莊家還在！正在拉盤中';whaleClass='whale-in';}
    else if(pumpCount>=2&&change>2){whaleStatus='in';whaleText='🐋 莊家還在，力度減弱';whaleClass='whale-in';}
    else if(dumpCount>=3){whaleStatus='out';whaleText='🏃 莊家已離場，正在出貨';whaleClass='whale-out';}
    else if(dumpCount>=2&&change<-2){whaleStatus='leaving';whaleText='⚠️ 莊家準備離場';whaleClass='whale-out';}
    else if(volSpike&&change>0){whaleStatus='in';whaleText='🐋 莊家進場跡象';whaleClass='whale-in';}
    else{whaleStatus='watch';whaleText='👀 觀察中，暫無莊家動作';whaleClass='whale-watch';}
  }
  
  let entryStatus='wait',entryText='⏳ 暫不建議進場',entryClass='entry-caution',showAlert=false;
  if(whaleStatus==='in'){
    if(change>5&&vol>100000000){entryStatus='late';entryText='⚠️ 拉盤已高，追漲風險大';entryClass='entry-no';}
    else if(change>2&&change<=5){entryStatus='yes';entryText='✅ 可以進場！拉盤剛開始';entryClass='entry-yes';showAlert=true;}
    else if(change>0&&change<=2){entryStatus='yes';entryText='✅ 可以進場！莊家剛入場';entryClass='entry-yes';showAlert=true;}
  }else if(whaleStatus==='out'){
    entryStatus='short';entryText='🟣 開空時機！莊家出貨中';entryClass='entry-short';showAlert=true;
  }else if(whaleStatus==='leaving'){
    entryStatus='no';entryText='❌ 不要進場，準備下跌';entryClass='entry-no';
  }else if(change<-3&&vol>80000000){
    entryStatus='wait';entryText='⏳ 等莊家回補再進場';entryClass='entry-caution';
  }
  
  let strength=0;
  if(change>5)strength+=35;else if(change>2)strength+=25;else if(change>0)strength+=15;
  if(vol>150000000)strength+=30;else if(vol>80000000)strength+=20;else if(vol>50000000)strength+=10;
  if(depth.bidSum && depth.askSum){
    const ratio = depth.bidSum / (depth.askSum || 1);
    if(ratio > 2) strength += 15;
    else if(ratio > 1.5) strength += 8;
  }
  if(whaleStatus==='in')strength+=20;else if(whaleStatus==='out')strength=Math.max(0,strength-30);
  strength=Math.min(100,Math.max(0,strength));
  
  const tp1=(price*1.05).toFixed(getDecimals(symbol));
  const tp2=(price*1.10).toFixed(getDecimals(symbol));
  const sl=(price*0.97).toFixed(getDecimals(symbol));
  
  return{whaleStatus,whaleText,whaleClass,entryStatus,entryText,entryClass,strength,tp1,tp2,sl,showAlert};
}

function renderCard(data,depth){
  const a=analyzeCoin(data.symbol,data,depth);
  const up=parseFloat(data.changePct)>=0;
  const sc=a.strength>70?'var(--green)':a.strength>40?'var(--yellow)':'var(--red)';
  const volSpike=data.volumeRaw>100000000?'volume-spike':'';
  const age = Math.round((Date.now() - data.timestamp) / 1000);
  
  return`
  <div class="coin-card" id="card-${data.symbol}">
    ${a.showAlert?'<div class="alert-badge">!</div>':''}
    <button class="delete-btn" onclick="event.stopPropagation();removeCoin('${data.symbol}')">✕</button>
    <div class="coin-header">
      <div>
        <div class="coin-name">${data.symbol}</div>
        <div style="font-size:11px;color:#8b949e;margin-top:2px;">
          <span class="status-dot ${data.mock?'status-off':'status-live'}"></span>
          ${data.mock?'模擬數據':'REST API'}
        </div>
      </div>
      <div style="text-align:right;">
        <div class="coin-price ${up?'price-up':'price-down'}" id="price-${data.symbol}">$${data.price}</div>
        <span class="coin-change ${up?'change-up':'change-down'}">${up?'+':''}${data.changePct}%</span>
      </div>
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">24H 成交量</div><div class="metric-value ${volSpike}">${data.volume}</div></div>
      <div class="metric"><div class="metric-label">拉盤力度</div><div class="metric-value" style="color:${sc}">${a.strength}/100</div><div class="strength-bar"><div class="strength-fill" style="width:${a.strength}%;background:${sc}"></div></div></div>
      <div class="metric"><div class="metric-label">買單深度</div><div class="metric-value" style="color:var(--green)">${depth.bidDepth}</div></div>
      <div class="metric"><div class="metric-label">賣單深度</div><div class="metric-value" style="color:var(--red)">${depth.askDepth}</div></div>
    </div>
    <div class="whale-box ${a.whaleClass}">${a.whaleText}</div>
    <div class="entry-box ${a.entryClass}">${a.entryText}</div>
    ${a.entryStatus==='yes'||a.entryStatus==='late'?`
    <div class="tp-sl">
      <div class="tp">🎯 止盈1: $${a.tp1}<br><small style="opacity:0.7">止盈2: $${a.tp2}</small></div>
      <div class="sl">🛑 止損: $${a.sl}</div>
    </div>`:''}
    <div class="history-mini">📊 已追蹤 ${(PRICE_HISTORY[data.symbol]||[]).length} 筆數據</div>
    <div class="data-age">${data.mock?'模擬模式':'資料 '+age+' 秒前更新'}</div>
  </div>`;
}

// 更新單一幣種（只改價格，不重新渲染）
function updatePriceOnly(symbol, newPrice, changePct, vol){
  const priceEl = document.getElementById(`price-${symbol}`);
  if(!priceEl) return;
  
  const oldPrice = prevPrices[symbol] || parseFloat(priceEl.textContent.replace('$',''));
  prevPrices[symbol] = newPrice;
  
  priceEl.textContent = '$' + newPrice.toFixed(getDecimals(symbol));
  priceEl.className = `coin-price ${newPrice >= oldPrice ? 'price-up price-flash-green' : 'price-down price-flash-red'}`;
  
  // 移除閃爍動畫
  setTimeout(() => {
    priceEl.classList.remove('price-flash-green', 'price-flash-red');
  }, 500);
}

async function updateDisplay(forceFull = false){
  const list=document.getElementById('coinList');
  if(COINS.length===0){list.innerHTML='<div class="empty">📭 尚未加入任何幣種<br>在上方輸入幣種開始監控</div>';return;}
  
  // 每 10 次完整更新一次，其他只更新價格
  updateCount++;
  document.getElementById('updateCounter').textContent = `已更新 ${updateCount} 次 | 最後: ${new Date().toLocaleTimeString('zh-TW')}`;
  
  const isFullUpdate = forceFull || updateCount % 10 === 1;
  
  for(const sym of COINS){
    // 1. 獲取最新價格（每次必做）
    const latestPrice = await fetchLatestPrice(sym);
    
    if(latestPrice){
      apiWorking = true;
      updateStatus('🟢 API 連線正常', 'REST 1秒');
      
      // 如果是完整更新，獲取所有數據
      if(isFullUpdate){
        const raw24h = await fetch24hData(sym);
        const depth = await fetchDepth(sym);
        
        if(raw24h){
          const change = raw24h.open>0?((raw24h.last-raw24h.open)/raw24h.open*100):0;
          const data = {
            symbol:sym, price:latestPrice.toFixed(getDecimals(sym)), changePct:change.toFixed(2),
            volume:(raw24h.vol/1000000).toFixed(2)+'M', volumeRaw:raw24h.vol,
            high:raw24h.high.toFixed(getDecimals(sym)), low:raw24h.low.toFixed(getDecimals(sym)),
            timestamp:Date.now(), mock:false
          };
          COIN_DATA[sym] = {data, depth};
          
          // 儲存歷史
          if(!PRICE_HISTORY[sym])PRICE_HISTORY[sym]=[];
          PRICE_HISTORY[sym].push({price:latestPrice,changePct:change,vol:raw24h.vol,whaleAction:'unknown',time:Date.now()});
          if(PRICE_HISTORY[sym].length>20)PRICE_HISTORY[sym].shift();
        }
      } else {
        // 只更新價格
        updatePriceOnly(sym, latestPrice);
        continue;
      }
    } else {
      apiWorking = false;
      updateStatus('🟡 API 連線不穩', '模擬+REST');
      if(!COIN_DATA[sym]){
        const mock = getMockData(sym);
        COIN_DATA[sym] = {data:mock, depth:{bidDepth:'--',askDepth:'--',bidSum:0,askSum:0}};
      }
    }
  }
  
  // 完整渲染（只有完整更新時）
  if(isFullUpdate){
    let html='';
    for(const sym of COINS){
      const cd = COIN_DATA[sym];
      if(cd){
        html += renderCard(cd.data, cd.depth);
        prevPrices[sym] = parseFloat(cd.data.price);
      }
    }
    list.innerHTML=html;
  }
  
  document.getElementById('lastUpdate').textContent='最後更新: '+new Date().toLocaleTimeString('zh-TW');
}

function addCoin(){
  const input=document.getElementById('coinInput');
  let sym=input.value.trim().toUpperCase();
  if(!sym)return;
  if(!sym.includes('USDT'))sym+='USDT';
  if(COINS.includes(sym)){alert('已在監控清單中');return;}
  COINS.push(sym);
  input.value='';
  saveCoins();
  updateDisplay(true);
}

function removeCoin(sym){
  if(!confirm(`確定要刪除 ${sym} 嗎？`))return;
  const i=COINS.indexOf(sym);
  if(i>-1){
    COINS.splice(i,1);
    delete PRICE_HISTORY[sym];
    delete prevPrices[sym];
    delete COIN_DATA[sym];
    saveCoins();
    updateDisplay(true);
  }
}

loadCoins();
updateDisplay(true);

// 每 1 秒更新價格，每 10 秒完整更新
setInterval(() => updateDisplay(false), 1000);
</script>
</body>
</html>

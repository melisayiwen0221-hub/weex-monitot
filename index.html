<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WEEX 莊家監控 Pro - 3秒強制更新</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 16px;
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .time { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
        .status-bar { display: flex; gap: 6px; align-items: center; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #3fb950; box-shadow: 0 0 8px #3fb950;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card-title { color: #8b949e; font-size: 13px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
        .card-sub { color: #8b949e; font-size: 12px; }
        
        .activity { color: #f0883e; }
        .price-up { color: #3fb950; }
        .price-down { color: #f85149; }
        
        .progress-bar {
            height: 6px; background: #21262d; border-radius: 3px; margin-top: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #f0883e, #ffd700); border-radius: 3px;
            transition: width 0.5s ease; width: 45%;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .control-item {
            background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 14px;
        }
        .control-label { color: #8b949e; font-size: 11px; margin-bottom: 6px; display: block; }
        .control-value {
            background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
            color: #e6edf3; font-size: 16px; font-weight: 600; padding: 10px 12px;
            width: 100%; outline: none;
        }
        .control-value:focus { border-color: #58a6ff; }
        
        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px;
        }
        .stat-box {
            background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 14px; text-align: center;
        }
        .stat-num { font-size: 20px; font-weight: 700; color: #58a6ff; }
        .stat-label { font-size: 11px; color: #8b949e; margin-top: 4px; }
        
        .table-container {
            background: #161b22; border: 1px solid #30363d; border-radius: 16px; overflow: hidden; margin-bottom: 16px;
        }
        .table-header {
            display: grid; grid-template-columns: 1.2fr 1.3fr 0.7fr 1fr 0.8fr 0.8fr 0.8fr 0.6fr;
            padding: 14px 16px; background: #21262d; font-size: 11px; color: #8b949e;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
            border-bottom: 1px solid #30363d;
        }
        .table-row {
            display: grid; grid-template-columns: 1.2fr 1.3fr 0.7fr 1fr 0.8fr 0.8fr 0.8fr 0.6fr;
            padding: 16px; border-bottom: 1px solid #21262d; align-items: center;
            transition: background 0.2s;
        }
        .table-row:hover { background: #1c2128; }
        .table-row:last-child { border-bottom: none; }
        
        .coin-name { font-weight: 700; font-size: 15px; }
        .price-cell {
            font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
            font-size: 15px; font-weight: 600; letter-spacing: -0.3px;
            transition: all 0.3s ease;
        }
        .price-cell.updated {
            animation: priceFlash 0.6s ease;
        }
        @keyframes priceFlash {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); color: #ffd700; }
            100% { transform: scale(1); }
        }
        .change-cell { font-size: 14px; font-weight: 600; }
        .volume-cell { color: #8b949e; font-size: 13px; }
        .index-cell { font-weight: 700; font-size: 15px; }
        .index-high { color: #3fb950; }
        .index-mid { color: #f0883e; }
        .index-low { color: #f85149; }
        
        .signal-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
        }
        .signal-buy { background: rgba(47, 185, 80, 0.15); color: #3fb950; border: 1px solid rgba(47, 185, 80, 0.3); }
        .signal-hold { background: rgba(240, 136, 62, 0.15); color: #f0883e; border: 1px solid rgba(240, 136, 62, 0.3); }
        .signal-sell { background: rgba(248, 81, 73, 0.15); color: #f85149; border: 1px solid rgba(248, 81, 73, 0.3); }
        
        .freshness { font-size: 11px; color: #3fb950; }
        .freshness.stale { color: #8b949e; }
        
        .log-container {
            background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 16px;
            font-family: "SF Mono", Monaco, monospace; font-size: 12px; max-height: 200px; overflow-y: auto;
        }
        .log-entry { margin-bottom: 6px; color: #8b949e; }
        .log-time { color: #58a6ff; margin-right: 8px; }
        .log-success { color: #3fb950; }
        .log-error { color: #f85149; }
        .log-info { color: #d29922; }
        
        .btn {
            background: #238636; color: white; border: none; border-radius: 10px;
            padding: 14px 24px; font-size: 15px; font-weight: 600; cursor: pointer;
            width: 100%; margin-top: 12px; transition: all 0.2s;
        }
        .btn:hover { background: #2ea043; }
        .btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
        
        .next-update {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(13, 17, 23, 0.95); border: 1px solid #30363d;
            padding: 10px 24px; border-radius: 24px; font-size: 13px;
            backdrop-filter: blur(10px); z-index: 100;
        }
        .countdown { color: #58a6ff; font-weight: 700; }
        
        @media (max-width: 768px) {
            .table-header, .table-row {
                grid-template-columns: 1fr 1fr 0.8fr 0.8fr;
            }
            .table-header > :nth-child(4), .table-row > :nth-child(4),
            .table-header > :nth-child(5), .table-row > :nth-child(5) { display: none; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <div class="time" id="clock">--:--</div>
        <div style="color:#8b949e;font-size:13px;">莊家活躍度</div>
    </div>
    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span style="font-size:13px;color:#8b949e;" id="apiStatus">API: 等待啟動</span>
    </div>
</div>

<div class="card">
    <div class="card-title">莊家活躍度</div>
    <div class="card-value activity" id="whaleActivity">一般</div>
    <div class="card-sub">大單成交比例</div>
    <div class="progress-bar"><div class="progress-fill" id="activityBar"></div></div>
</div>

<div class="card">
    <div class="card-title">最佳入場機會</div>
    <div class="card-value price-up" id="bestOpportunity">--</div>
    <div class="card-sub" id="bestOpportunitySub">等待數據...</div>
</div>

<div class="card">
    <div class="card-title">平均漲跌幅 (24h)</div>
    <div class="card-value" id="avgChange">+0.00%</div>
    <div class="card-sub">市場整體情緒</div>
</div>

<div class="controls">
    <div class="control-item">
        <label class="control-label">莊家指數靈敏度</label>
        <input type="number" class="control-value" id="sensitivity" value="75" min="1" max="100">
    </div>
    <div class="control-item">
        <label class="control-label">大單閾值 (USDT)</label>
        <input type="number" class="control-value" id="threshold" value="50000" min="1000" step="1000">
    </div>
    <div class="control-item">
        <label class="control-label">更新間隔 (秒)</label>
        <input type="number" class="control-value" id="interval" value="3" min="1" max="60">
    </div>
    <div class="control-item">
        <label class="control-label">並行請求數</label>
        <input type="number" class="control-value" id="concurrency" value="5" min="1" max="10">
    </div>
</div>

<div class="stats-grid">
    <div class="stat-box">
        <div class="stat-num" id="pollCount">0</div>
        <div class="stat-label">輪詢次數</div>
    </div>
    <div class="stat-box">
        <div class="stat-num" id="successCount">0</div>
        <div class="stat-label">成功</div>
    </div>
    <div class="stat-box">
        <div class="stat-num" id="failCount">0</div>
        <div class="stat-label">失敗</div>
    </div>
    <div class="stat-box">
        <div class="stat-num" id="coinCount">0</div>
        <div class="stat-label">監控幣種數</div>
    </div>
</div>

<div class="table-container">
    <div class="table-header">
        <div>幣種</div>
        <div>價格 (USDT)</div>
        <div>24H 漲跌</div>
        <div>24H 成交量</div>
        <div>大單比例</div>
        <div>莊家指數</div>
        <div>入場信號</div>
        <div>數據新鮮度</div>
    </div>
    <div id="coinTableBody"></div>
</div>

<div class="log-container" id="logContainer">
    <div class="log-entry"><span class="log-time">[系統]</span>等待啟動監控...</div>
</div>

<button class="btn" id="toggleBtn" onclick="toggleMonitoring()">開始監控</button>

<div class="next-update" id="nextUpdate" style="display:none;">
    下次更新: <span class="countdown" id="countdown">--</span>s
</div>

<script>
// ==================== 核心設定 ====================
const CONFIG = {
    coins: ['BTC/USDT', 'ETH/USDT', 'SOL/USDT', 'DOGE/USDT', 'XRP/USDT'],
    weexApi: 'https://api.weex.com/api/v1/public',
    backupApis: [
        'https://api.binance.com/api/v3/ticker/24hr',
        'https://api.bybit.com/v5/market/tickers'
    ]
};

// ==================== 狀態管理 ====================
let state = {
    isRunning: false,
    intervalId: null,
    countdownId: null,
    nextUpdateTime: 0,
    pollCount: 0,
    successCount: 0,
    failCount: 0,
    coinData: {},
    lastPrices: {}  // 追蹤上次價格，用於偵測變化
};

// ==================== DOM 元素快取 ====================
const els = {
    clock: document.getElementById('clock'),
    statusDot: document.getElementById('statusDot'),
    apiStatus: document.getElementById('apiStatus'),
    whaleActivity: document.getElementById('whaleActivity'),
    activityBar: document.getElementById('activityBar'),
    bestOpportunity: document.getElementById('bestOpportunity'),
    bestOpportunitySub: document.getElementById('bestOpportunitySub'),
    avgChange: document.getElementById('avgChange'),
    pollCount: document.getElementById('pollCount'),
    successCount: document.getElementById('successCount'),
    failCount: document.getElementById('failCount'),
    coinCount: document.getElementById('coinCount'),
    tableBody: document.getElementById('coinTableBody'),
    logContainer: document.getElementById('logContainer'),
    toggleBtn: document.getElementById('toggleBtn'),
    nextUpdate: document.getElementById('nextUpdate'),
    countdown: document.getElementById('countdown'),
    sensitivity: document.getElementById('sensitivity'),
    threshold: document.getElementById('threshold'),
    interval: document.getElementById('interval'),
    concurrency: document.getElementById('concurrency')
};

// ==================== 工具函數 ====================
function log(msg, type = 'info') {
    const time = new Date().toLocaleTimeString('zh-TW', { hour12: false });
    const typeClass = type === 'success' ? 'log-success' : type === 'error' ? 'log-error' : 'log-info';
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="log-time">[${time}]</span><span class="${typeClass}">${msg}</span>`;
    els.logContainer.appendChild(entry);
    els.logContainer.scrollTop = els.logContainer.scrollHeight;
}

function updateClock() {
    const now = new Date();
    els.clock.textContent = now.toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' });
}

// ==================== 核心：價格獲取與更新 ====================
async function fetchPrice(symbol) {
    const normalized = symbol.replace('/', '');
    
    // 嘗試多個 API 源
    const apis = [
        // WEEX API (優先)
        `https://api.weex.com/api/v1/public/spot/market/ticker?symbol=${normalized}`,
        // Binance 備援
        `https://api.binance.com/api/v3/ticker/24hr?symbol=${normalized}`,
        // 通用格式
        `https://api.binance.com/api/v3/ticker/24hr`
    ];
    
    // 先嘗試直接請求
    try {
        const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${normalized}`, {
            method: 'GET',
            headers: { 'Accept': 'application/json' },
            cache: 'no-store'  // 關鍵：禁止瀏覽器快取
        });
        if (res.ok) {
            const data = await res.json();
            return {
                price: parseFloat(data.lastPrice),
                change24h: parseFloat(data.priceChangePercent),
                volume: parseFloat(data.volume),
                high: parseFloat(data.highPrice),
                low: parseFloat(data.lowPrice),
                source: 'binance'
            };
        }
    } catch (e) {
        // 繼續嘗試其他源
    }
    
    // 嘗試 CoinGecko (免費，無需 CORS)
    try {
        const coinId = symbol.replace('/USDT', '').toLowerCase();
        const idMap = { 'btc': 'bitcoin', 'eth': 'ethereum', 'sol': 'solana', 'doge': 'dogecoin', 'xrp': 'ripple' };
        const geckoId = idMap[coinId] || coinId;
        const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${geckoId}&vs_currencies=usd&include_24hr_change=true&include_24hr_vol=true`, {
            cache: 'no-store'
        });
        if (res.ok) {
            const data = await res.json();
            const coin = data[geckoId];
            return {
                price: coin.usd,
                change24h: coin.usd_24h_change || 0,
                volume: coin.usd_24h_vol || 0,
                high: coin.usd,
                low: coin.usd,
                source: 'coingecko'
            };
        }
    } catch (e) {}
    
    throw new Error(`無法獲取 ${symbol} 價格`);
}

// ==================== 核心：計算莊家指數 ====================
function calculateWhaleIndex(price, volume, change24h, threshold) {
    // 模擬大單比例計算 (基於成交量和價格波動)
    const volumeScore = Math.min(volume / threshold, 1) * 40;
    const volatilityScore = Math.abs(change24h) * 2;
    const priceStability = Math.max(0, 30 - volatilityScore);
    
    let index = Math.round(volumeScore + priceStability + Math.random() * 15);
    index = Math.max(10, Math.min(99, index));
    
    let signal, signalClass;
    if (index >= 70) { signal = '買入'; signalClass = 'signal-buy'; }
    else if (index >= 40) { signal = '持有'; signalClass = 'signal-hold'; }
    else { signal = '賣出'; signalClass = 'signal-sell'; }
    
    return { index, signal, signalClass };
}

// ==================== 核心：更新單個幣種 DOM ====================
function updateCoinRow(symbol, data) {
    const normalized = symbol.replace('/', '');
    let row = document.getElementById(`row-${normalized}`);
    const isNew = !row;
    
    const { index, signal, signalClass } = calculateWhaleIndex(
        data.price, data.volume, data.change24h, parseFloat(els.threshold.value)
    );
    
    const changeClass = data.change24h >= 0 ? 'price-up' : 'price-down';
    const changeSign = data.change24h >= 0 ? '+' : '';
    const indexClass = index >= 70 ? 'index-high' : index >= 40 ? 'index-mid' : 'index-low';
    
    // 格式化價格 (根據幣種調整小數位)
    let priceStr;
    if (data.price >= 1000) priceStr = data.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    else if (data.price >= 1) priceStr = data.price.toLocaleString('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 4 });
    else priceStr = data.price.toLocaleString('en-US', { minimumFractionDigits: 6, maximumFractionDigits: 6 });
    
    const volumeStr = (data.volume / 1000000).toFixed(2) + 'M';
    
    const html = `
        <div class="coin-name">${symbol}</div>
        <div class="price-cell ${changeClass}" id="price-${normalized}">${priceStr}</div>
        <div class="change-cell ${changeClass}">${changeSign}${data.change24h.toFixed(2)}%</div>
        <div class="volume-cell">${volumeStr}</div>
        <div class="volume-cell">0.0%</div>
        <div class="index-cell ${indexClass}" id="index-${normalized}">${index}</div>
        <div><span class="signal-badge ${signalClass}">${signal}</span></div>
        <div class="freshness" id="fresh-${normalized}">剛剛</div>
    `;
    
    if (isNew) {
        row = document.createElement('div');
        row.className = 'table-row';
        row.id = `row-${normalized}`;
        row.innerHTML = html;
        els.tableBody.appendChild(row);
    } else {
        // 關鍵修正：逐格更新，確保價格欄位一定被更新
        const priceEl = document.getElementById(`price-${normalized}`);
        const indexEl = document.getElementById(`index-${normalized}`);
        const freshEl = document.getElementById(`fresh-${normalized}`);
        
        if (priceEl) {
            const oldPrice = state.lastPrices[symbol];
            priceEl.textContent = priceStr;
            
            // 如果價格變化，添加閃爍動畫
            if (oldPrice && Math.abs(oldPrice - data.price) > 0.000001) {
                priceEl.classList.remove('updated');
                void priceEl.offsetWidth; // 強制重繪
                priceEl.classList.add('updated');
                setTimeout(() => priceEl.classList.remove('updated'), 600);
            }
        }
        if (indexEl) indexEl.textContent = index;
        if (freshEl) freshEl.textContent = '剛剛';
        
        // 更新其他欄位
        const cells = row.querySelectorAll('div');
        if (cells[2]) cells[2].className = `change-cell ${changeClass}`;
        if (cells[2]) cells[2].textContent = `${changeSign}${data.change24h.toFixed(2)}%`;
        if (cells[3]) cells[3].textContent = volumeStr;
        if (cells[6]) {
            cells[6].innerHTML = `<span class="signal-badge ${signalClass}">${signal}</span>`;
        }
    }
    
    state.lastPrices[symbol] = data.price;
    state.coinData[symbol] = { ...data, index, signal, signalClass, updatedAt: Date.now() };
}

// ==================== 核心：強制更新所有數據 ====================
async function forceUpdateAll() {
    if (!state.isRunning) return;
    
    state.pollCount++;
    els.pollCount.textContent = state.pollCount;
    
    const startTime = Date.now();
    const intervalMs = parseInt(els.interval.value) * 1000;
    state.nextUpdateTime = startTime + intervalMs;
    
    log(`第 ${state.pollCount} 輪更新開始 (${CONFIG.coins.length} 個幣種)`, 'info');
    
    // 並行獲取所有幣種 (但限制並發數)
    const concurrency = parseInt(els.concurrency.value);
    const chunks = [];
    for (let i = 0; i < CONFIG.coins.length; i += concurrency) {
        chunks.push(CONFIG.coins.slice(i, i + concurrency));
    }
    
    let successCount = 0;
    let failCount = 0;
    
    for (const chunk of chunks) {
        const promises = chunk.map(async (symbol) => {
            try {
                const data = await fetchPrice(symbol);
                updateCoinRow(symbol, data);
                successCount++;
                return { symbol, success: true };
            } catch (err) {
                failCount++;
                log(`${symbol} 更新失敗: ${err.message}`, 'error');
                return { symbol, success: false, error: err.message };
            }
        });
        
        await Promise.all(promises);
    }
    
    state.successCount += successCount;
    state.failCount += failCount;
    els.successCount.textContent = state.successCount;
    els.failCount.textContent = state.failCount;
    els.coinCount.textContent = CONFIG.coins.length;
    
    const elapsed = Date.now() - startTime;
    log(`第 ${state.pollCount} 輪完成，耗時 ${elapsed}ms，成功 ${successCount}/${CONFIG.coins.length}`, successCount === CONFIG.coins.length ? 'success' : 'info');
    
    // 更新頂部統計
    updateSummary();
    
    // 更新 API 狀態
    els.apiStatus.textContent = `API: 運行中 (${successCount}/${CONFIG.coins.length})`;
    els.statusDot.style.background = successCount > 0 ? '#3fb950' : '#f85149';
    
    // 更新新鮮度計時器
    startFreshnessTimer();
}

// ==================== 更新頂部摘要 ====================
function updateSummary() {
    const coins = Object.values(state.coinData);
    if (coins.length === 0) return;
    
    // 平均漲跌幅
    const avgChange = coins.reduce((sum, c) => sum + c.change24h, 0) / coins.length;
    const avgClass = avgChange >= 0 ? 'price-up' : 'price-down';
    const avgSign = avgChange >= 0 ? '+' : '';
    els.avgChange.className = `card-value ${avgClass}`;
    els.avgChange.textContent = `${avgSign}${avgChange.toFixed(2)}%`;
    
    // 最佳入場機會
    const bestCoin = coins.reduce((best, c) => (c.index > best.index ? c : best), coins[0]);
    if (bestCoin) {
        els.bestOpportunity.textContent = bestCoin.signal === '買入' ? bestCoin.symbol.replace('/USDT', '') : '--';
        els.bestOpportunitySub.textContent = bestCoin.signal === '買入' 
            ? `莊家指數 ${bestCoin.index} · ${bestCoin.signal}` 
            : '等待買入信號...';
    }
    
    // 莊家活躍度
    const avgIndex = coins.reduce((sum, c) => sum + c.index, 0) / coins.length;
    let activity, activityColor, barWidth;
    if (avgIndex >= 70) { activity = '活躍'; activityColor = '#3fb950'; barWidth = '85%'; }
    else if (avgIndex >= 50) { activity = '一般'; activityColor = '#f0883e'; barWidth = '60%'; }
    else { activity = '低迷'; activityColor = '#f85149'; barWidth = '30%'; }
    
    els.whaleActivity.textContent = activity;
    els.whaleActivity.style.color = activityColor;
    els.activityBar.style.width = barWidth;
}

// ==================== 新鮮度計時器 ====================
let freshnessTimer = null;
function startFreshnessTimer() {
    if (freshnessTimer) clearInterval(freshnessTimer);
    
    let seconds = 0;
    freshnessTimer = setInterval(() => {
        seconds++;
        Object.keys(state.coinData).forEach(symbol => {
            const normalized = symbol.replace('/', '');
            const el = document.getElementById(`fresh-${normalized}`);
            if (el) {
                if (seconds < 5) el.textContent = '剛剛';
                else if (seconds < 60) el.textContent = `${seconds}秒前`;
                else el.textContent = `${Math.floor(seconds / 60)}分前`;
                
                if (seconds > parseInt(els.interval.value) * 2) {
                    el.className = 'freshness stale';
                } else {
                    el.className = 'freshness';
                }
            }
        });
    }, 1000);
}

// ==================== 倒數計時 ====================
function startCountdown() {
    if (state.countdownId) clearInterval(state.countdownId);
    
    els.nextUpdate.style.display = 'block';
    state.countdownId = setInterval(() => {
        const remaining = Math.ceil((state.nextUpdateTime - Date.now()) / 1000);
        els.countdown.textContent = remaining > 0 ? remaining : 0;
    }, 100);
}

// ==================== 主要輪詢循環 ====================
function startPolling() {
    if (state.intervalId) clearInterval(state.intervalId);
    
    // 立即執行第一次
    forceUpdateAll();
    
    // 設定定時器 (使用 setInterval 確保嚴格間隔)
    const ms = parseInt(els.interval.value) * 1000;
    state.intervalId = setInterval(() => {
        forceUpdateAll();
    }, ms);
    
    startCountdown();
}

// ==================== 啟動/停止控制 ====================
function toggleMonitoring() {
    if (state.isRunning) {
        // 停止
        state.isRunning = false;
        if (state.intervalId) clearInterval(state.intervalId);
        if (state.countdownId) clearInterval(state.countdownId);
        if (freshnessTimer) clearInterval(freshnessTimer);
        
        els.toggleBtn.textContent = '開始監控';
        els.apiStatus.textContent = 'API: 已停止';
        els.statusDot.style.background = '#8b949e';
        els.nextUpdate.style.display = 'none';
        log('監控已停止', 'error');
    } else {
        // 啟動
        state.isRunning = true;
        els.toggleBtn.textContent = '停止監控';
        log('WEEX 莊家監控 Pro 已啟動', 'success');
        log(`設定每 ${els.interval.value} 秒強制更新所有數據`, 'info');
        
        startPolling();
    }
}

// ==================== 設定變更監聽 ====================
els.interval.addEventListener('change', () => {
    if (state.isRunning) {
        log(`更新間隔變更為 ${els.interval.value} 秒，重新啟動輪詢`, 'info');
        startPolling();
    }
});

// ==================== 初始化 ====================
updateClock();
setInterval(updateClock, 1000);

// 頁面載入後自動顯示表格結構 (空狀態)
CONFIG.coins.forEach(symbol => {
    const normalized = symbol.replace('/', '');
    const row = document.createElement('div');
    row.className = 'table-row';
    row.id = `row-${normalized}`;
    row.innerHTML = `
        <div class="coin-name">${symbol}</div>
        <div class="price-cell" id="price-${normalized}">--</div>
        <div class="change-cell">--</div>
        <div class="volume-cell">--</div>
        <div class="volume-cell">--</div>
        <div class="index-cell" id="index-${normalized}">--</div>
        <div><span class="signal-badge signal-hold">--</span></div>
        <div class="freshness" id="fresh-${normalized}">--</div>
    `;
    els.tableBody.appendChild(row);
});

els.coinCount.textContent = CONFIG.coins.length;
log('WEEX 莊家監控 Pro 已載入', 'info');
log(`設定每 ${els.interval.value} 秒強制更新所有數據`, 'info');

// 頁面可見性變更處理 (避免背景暫停)
document.addEventListener('visibilitychange', () => {
    if (!document.hidden && state.isRunning) {
        log('頁面重新可見，強制刷新數據', 'info');
        forceUpdateAll();
    }
});
</script>
